<!-- RSVP Status + Headcount Summary -->
<div class="analytics-row">
  <div class="card analytics-card">
    <div class="card-header">
      <span class="icon">✅</span>
      <span data-i18n="analytics_rsvp_title">סטטוס אישור הגעה</span>
    </div>
    <div id="analyticsRsvpDonut"></div>
  </div>
  <div class="card analytics-card">
    <div class="card-header">
      <span class="icon">👥</span>
      <span data-i18n="analytics_headcount_title">סיכום מוזמנים</span>
    </div>
    <div class="analytics-headcount-grid">
      <div class="analytics-stat-box">
        <div class="analytics-stat-num" id="analyticsHeadAdults">0</div>
        <div class="analytics-stat-lbl" data-i18n="analytics_adults">
          מבוגרים
        </div>
      </div>
      <div class="analytics-stat-box">
        <div class="analytics-stat-num" id="analyticsHeadChildren">0</div>
        <div class="analytics-stat-lbl" data-i18n="analytics_children">
          ילדים
        </div>
      </div>
      <div class="analytics-stat-box">
        <div class="analytics-stat-num" id="analyticsHeadTotal">0</div>
        <div class="analytics-stat-lbl" data-i18n="analytics_total_heads">
          סה״כ נפשות
        </div>
      </div>
      <div class="analytics-stat-box analytics-stat-highlight">
        <div class="analytics-stat-num" id="analyticsHeadConfirmed">0</div>
        <div class="analytics-stat-lbl" data-i18n="analytics_confirmed_count">
          נפשות מאושרות
        </div>
      </div>
      <div class="analytics-stat-box">
        <div class="analytics-stat-num" id="analyticsHeadAccess">0</div>
        <div class="analytics-stat-lbl" data-i18n="analytics_access_count">
          צרכי נגישות
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Side Distribution + Meal Preferences -->
<div class="analytics-row">
  <div class="card analytics-card">
    <div class="card-header">
      <span class="icon">⚖️</span>
      <span data-i18n="analytics_side_title">חלוקת צדדים</span>
    </div>
    <div id="analyticsSideDonut"></div>
  </div>
  <div class="card analytics-card">
    <div class="card-header">
      <span class="icon">🍽️</span>
      <span data-i18n="analytics_meal_title">העדפות תזונה</span>
    </div>
    <div id="analyticsMealBar"></div>
  </div>
</div>

<!-- Invitation Status -->
<div class="card">
  <div class="card-header">
    <span class="icon">📤</span>
    <span data-i18n="analytics_sent_title">סטטוס שליחת הזמנות</span>
  </div>
  <div id="analyticsSentChart"></div>
</div>

<!-- Budget vs Expenses Chart -->
<div class="card">
  <div class="card-header">
    <span class="icon">💰</span>
    <span data-i18n="budget_chart">פירוט הוצאות</span>
  </div>
  <div id="analyticsBudgetBar"></div>
</div>

<!-- Meal Summary for Caterer -->
<div class="card" id="analyticsMealSummary"></div>
