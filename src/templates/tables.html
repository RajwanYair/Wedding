<div class="card">
        <div class="card-header">
          <span class="icon">🪑</span> <span data-i18n="tables_title">סידורי ישיבה</span>
          <div class="section-toolbar-start">
            <button class="btn btn-primary btn-small" data-action="openAddTableModal">
              <span>➕</span> <span data-i18n="action_add_table">הוסף שולחן</span>
            </button>
            <button class="btn btn-secondary btn-small" data-action="printSeatingChart" data-i18n-tooltip="tip_print_seating">
              <span>🖨️</span> <span data-i18n="action_print_seating">ייצוא תרשים ישיבה</span>
            </button>
            <button class="btn btn-secondary btn-small" data-action="autoAssignTables" data-i18n-tooltip="tip_auto_assign">
              <span>🪄</span> <span data-i18n="btn_auto_assign">שיבוץ אוטומטי</span>
            </button>
            <button class="btn btn-accent btn-small" data-action="smartAutoAssign" data-i18n-tooltip="tip_smart_assign">
              <span>🧠</span> <span data-i18n="btn_smart_assign">שיבוץ חכם</span>
            </button>
          </div>
        </div>
        <div class="seating-floor" id="seatingFloor">
        </div>
        <div class="empty-state" id="tablesEmpty">
          <div class="icon">🍽️</div>
          <p data-i18n="tables_empty">עדיין לא הגדרת שולחנות. לחץ על "הוסף שולחן" כדי להתחיל!</p>
          <p class="empty-sub">👆 ➕</p>
        </div>
      </div>

      <!-- Unassigned Guests -->
      <div class="card" id="unassignedCard" data-i18n-tooltip="tip_unassigned">
        <div class="card-header"><span class="icon">🔀</span> <span data-i18n="unassigned_title">אורחים ללא שולחן</span></div>
        <div id="unassignedGuests"></div>
      </div>

      <!-- S11.2 Transport Manifest -->
      <div class="card" id="transportManifestCard">
        <div class="card-header">
          <span class="icon">🚌</span>
          <span data-i18n="transport_manifest_title">רשימת הסעות</span>
          <div class="section-toolbar-start">
            <button class="btn btn-secondary btn-small" data-action="exportTransportCSV">
              <span>📥</span> <span data-i18n="transport_export_csv">ייצוא CSV</span>
            </button>
            <button class="btn btn-secondary btn-small" data-action="printTransportManifest">
              <span>🖨️</span> <span data-i18n="transport_print">הדפסה</span>
            </button>
          </div>
        </div>
        <div id="transportManifest"></div>
      </div>
