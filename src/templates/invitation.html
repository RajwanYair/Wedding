<div class="card">
        <div class="card-header"><span class="icon">💌</span> <span data-i18n="invitation_title">הזמנת חתונה</span></div>

        <!-- Invitation Preview -->
        <div class="invitation-preview" id="invitationPreview">
          <div id="invitationImage">
            <!-- SVG Invitation will be rendered here -->
          </div>
        </div>

        <!-- Upload -->
        <div class="invitation-upload">
          <label data-i18n-tooltip="tip_upload_invite">
            <span>📁</span> <span data-i18n="upload_invitation">העלה תמונת הזמנה (JPG/PNG/SVG)</span>
            <input type="file" id="invitationFile" accept="image/*,.svg" data-on-change="handleInvitationUpload">
          </label>
        </div>
      </div>

      <!-- Wedding Details Form -->
      <div class="card">
        <div class="card-header"><span class="icon">⚙️</span> <span data-i18n="wedding_details">פרטי החתונה</span></div>

        <div class="form-section-title"><span class="sec-icon">💑</span> <span data-i18n="section_names">שמות הזוג</span></div>
        <div class="form-row">
          <div class="form-group">
            <label data-i18n="label_groom">שם החתן (עברית)</label>
            <input type="text" id="groomName" data-i18n-placeholder="ph_groom" placeholder="שם החתן" data-on-input="updateWeddingDetails">
          </div>
          <div class="form-group">
            <label data-i18n="label_bride">שם הכלה (עברית)</label>
            <input type="text" id="brideName" data-i18n-placeholder="ph_bride" placeholder="שם הכלה" data-on-input="updateWeddingDetails">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label data-i18n="label_groom_english">שם החתן (אנגלית)</label>
            <input type="text" id="groomNameEn" placeholder="Elior" dir="ltr" data-on-input="updateWeddingDetails">
          </div>
          <div class="form-group">
            <label data-i18n="label_bride_english">שם הכלה (אנגלית)</label>
            <input type="text" id="brideNameEn" placeholder="Tova" dir="ltr" data-on-input="updateWeddingDetails">
          </div>
        </div>

        <div class="form-section-title"><span class="sec-icon">📅</span> <span data-i18n="section_date">תאריך ושעה</span></div>
        <div class="form-row">
          <div class="form-group">
            <label data-i18n="label_date">תאריך החתונה</label>
            <input type="date" id="weddingDate" data-on-change="updateWeddingDetails">
          </div>
          <div class="form-group">
            <label data-i18n="label_hebrew_date">תאריך עברי</label>
            <input type="text" id="weddingHebrewDate" data-i18n-placeholder="ph_hebrew_date" placeholder="כ' באייר התשפ&quot;ו" data-on-input="updateWeddingDetails">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label data-i18n="label_time">קבלת פנים</label>
            <input type="time" id="weddingTime" value="18:00" data-on-change="updateWeddingDetails">
          </div>
          <div class="form-group">
            <label data-i18n="label_ceremony_time">טקס חופה</label>
            <input type="time" id="weddingCeremonyTime" value="19:30" data-on-change="updateWeddingDetails">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label data-i18n="label_rsvp_deadline">מועד אחרון לאישור הגעה</label>
            <input type="date" id="rsvpDeadline" data-on-change="updateWeddingDetails">
          </div>
        </div>

        <div class="form-section-title"><span class="sec-icon">📍</span> <span data-i18n="section_venue">מקום האירוע</span></div>
        <div class="form-group">
          <label data-i18n="label_venue">שם האולם</label>
          <input type="text" id="venueName" data-i18n-placeholder="ph_venue" placeholder="שם אולם האירועים" data-on-input="updateWeddingDetails">
        </div>
        <div class="form-group">
          <label data-i18n="label_venue_address">כתובת</label>
          <input type="text" id="venueAddress" data-i18n-placeholder="ph_address" placeholder="כתובת מלאה" data-on-input="updateWeddingDetails">
        </div>
        <div class="form-group">
          <label data-i18n="label_waze">קישור Waze</label>
          <input type="url" id="venueWaze" data-i18n-placeholder="ph_waze" placeholder="https://waze.com/ul/..." dir="ltr" data-on-input="updateWeddingDetails">
        </div>
      </div>

      <!-- Venue Map (auto-generated from address via OpenStreetMap) -->
      <div class="card u-hidden" id="venueMapContainer">
        <div class="card-header"><span class="icon">📍</span> <span data-i18n="map_title">מפת האירוע</span></div>
        <iframe id="venueMapFrame" width="100%" height="280" loading="lazy"
          title="Venue map"
          referrerpolicy="no-referrer"></iframe>
        <a id="venueMapFallback" href="#" target="_blank" rel="noopener noreferrer"
          class="venue-map-link u-hidden"
          data-i18n="map_fallback_link">פתח ב-Google Maps ↗</a>
      </div>
