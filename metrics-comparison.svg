<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 310" role="img" aria-label="Lighthouse Score Comparison: v1 vs v2.0 vs v2.3">
  <!-- Background -->
  <rect width="620" height="310" rx="12" fill="#161121"/>

  <!-- Title -->
  <text x="310" y="22" font-family="ui-monospace,monospace" font-size="11" font-weight="700" fill="#d4a574" text-anchor="middle" letter-spacing="0.5">LIGHTHOUSE SCORES — v1 vs v2</text>

  <!-- Legend -->
  <rect x="52" y="34" width="12" height="10" rx="2" fill="#2e2050" stroke="#6b5fa0" stroke-width="1"/>
  <text x="68" y="43" font-family="ui-monospace,monospace" font-size="8.5" fill="#6b5fa0">v1.12.0 (now)</text>
  <rect x="180" y="34" width="12" height="10" rx="2" fill="#182c44" stroke="#60a5fa" stroke-width="1"/>
  <text x="196" y="43" font-family="ui-monospace,monospace" font-size="8.5" fill="#60a5fa">v2.0.0 target</text>
  <rect x="318" y="34" width="12" height="10" rx="2" fill="#0e2618" stroke="#4ade80" stroke-width="1"/>
  <text x="334" y="43" font-family="ui-monospace,monospace" font-size="8.5" fill="#4ade80">v2.3.0 target</text>

  <!-- Bar area: x=148..548 (400px = score 0..100, 4px per point) -->
  <!-- Baseline at x=148 -->
  <line x1="148" y1="54" x2="148" y2="278" stroke="#3f3560" stroke-width="1.5"/>

  <!-- Grid lines at scores 60, 70, 80, 90, 100 -->
  <!-- 60 → x=148+240=388, 70 → 428, 80 → 468, 90 → 508, 100 → 548 -->
  <g stroke="#201c3a" stroke-width="1" fill="none">
    <line x1="388" y1="54" x2="388" y2="278"/>
    <line x1="428" y1="54" x2="428" y2="278"/>
    <line x1="468" y1="54" x2="468" y2="278"/>
    <line x1="508" y1="54" x2="508" y2="278"/>
    <line x1="548" y1="54" x2="548" y2="278"/>
  </g>
  <!-- Score axis labels -->
  <g font-family="ui-monospace,monospace" font-size="8.5" fill="#3a3068" text-anchor="middle">
    <text x="388" y="52">60</text>
    <text x="428" y="52">70</text>
    <text x="468" y="52">80</text>
    <text x="508" y="52">90</text>
    <text x="548" y="52">100</text>
  </g>

  <!-- ── Row 1: Performance ── (groups at y=68, pitch=16 per bar, gap=6) -->
  <!-- Current ~65 → w=260 -->
  <rect x="148" y="68" width="260" height="12" rx="3" fill="#2e2050" stroke="#6b5fa0" stroke-width="0.5"/>
  <text x="412" y="79" font-family="ui-monospace,monospace" font-size="8" fill="#6b5fa0">~65</text>
  <!-- v2.0 90 → w=360 -->
  <rect x="148" y="84" width="360" height="12" rx="3" fill="#182c44" stroke="#60a5fa" stroke-width="1"/>
  <text x="512" y="95" font-family="ui-monospace,monospace" font-size="8" fill="#60a5fa">90+</text>
  <!-- v2.3 95 → w=380 -->
  <rect x="148" y="100" width="380" height="12" rx="3" fill="#0e2618" stroke="#4ade80" stroke-width="1"/>
  <text x="532" y="111" font-family="ui-monospace,monospace" font-size="8" fill="#4ade80">95+</text>
  <!-- Category label -->
  <text x="143" y="91" font-family="ui-monospace,monospace" font-size="9.5" fill="#8a7ab0" text-anchor="end">Performance</text>

  <!-- ── Row 2: Accessibility ── (y=128) -->
  <!-- Current ~75 → w=300 -->
  <rect x="148" y="128" width="300" height="12" rx="3" fill="#2e2050" stroke="#6b5fa0" stroke-width="0.5"/>
  <text x="452" y="139" font-family="ui-monospace,monospace" font-size="8" fill="#6b5fa0">~75</text>
  <!-- v2.0 90 → w=360 -->
  <rect x="148" y="144" width="360" height="12" rx="3" fill="#182c44" stroke="#60a5fa" stroke-width="1"/>
  <text x="512" y="155" font-family="ui-monospace,monospace" font-size="8" fill="#60a5fa">90+</text>
  <!-- v2.3 95 → w=380 -->
  <rect x="148" y="160" width="380" height="12" rx="3" fill="#0e2618" stroke="#4ade80" stroke-width="1"/>
  <text x="532" y="171" font-family="ui-monospace,monospace" font-size="8" fill="#4ade80">95+</text>
  <!-- Category label -->
  <text x="143" y="151" font-family="ui-monospace,monospace" font-size="9.5" fill="#8a7ab0" text-anchor="end">Accessibility</text>

  <!-- ── Row 3: Best Practices ── (y=188) -->
  <!-- Current ~80 → w=320 -->
  <rect x="148" y="188" width="320" height="12" rx="3" fill="#2e2050" stroke="#6b5fa0" stroke-width="0.5"/>
  <text x="472" y="199" font-family="ui-monospace,monospace" font-size="8" fill="#6b5fa0">~80</text>
  <!-- v2.0 95 → w=380 -->
  <rect x="148" y="204" width="380" height="12" rx="3" fill="#182c44" stroke="#60a5fa" stroke-width="1"/>
  <text x="532" y="215" font-family="ui-monospace,monospace" font-size="8" fill="#60a5fa">95+</text>
  <!-- v2.3 100 → w=400 -->
  <rect x="148" y="220" width="400" height="12" rx="3" fill="#0e2618" stroke="#4ade80" stroke-width="1"/>
  <text x="552" y="231" font-family="ui-monospace,monospace" font-size="8" fill="#4ade80">100</text>
  <!-- Category label -->
  <text x="143" y="211" font-family="ui-monospace,monospace" font-size="9.5" fill="#8a7ab0" text-anchor="end">Best Practices</text>

  <!-- ── Row 4: SEO ── (y=248) -->
  <!-- Current ~70 → w=280 -->
  <rect x="148" y="248" width="280" height="12" rx="3" fill="#2e2050" stroke="#6b5fa0" stroke-width="0.5"/>
  <text x="432" y="259" font-family="ui-monospace,monospace" font-size="8" fill="#6b5fa0">~70</text>
  <!-- v2.0 90 → w=360 -->
  <rect x="148" y="264" width="360" height="12" rx="3" fill="#182c44" stroke="#60a5fa" stroke-width="1"/>
  <text x="512" y="275" font-family="ui-monospace,monospace" font-size="8" fill="#60a5fa">90+</text>
  <!-- v2.3 95 → w=380 -->
  <rect x="148" y="280" width="380" height="12" rx="3" fill="#0e2618" stroke="#4ade80" stroke-width="1"/>
  <text x="532" y="291" font-family="ui-monospace,monospace" font-size="8" fill="#4ade80">95+</text>
  <!-- Category label -->
  <text x="143" y="271" font-family="ui-monospace,monospace" font-size="9.5" fill="#8a7ab0" text-anchor="end">SEO</text>

  <!-- Target zone annotation (90+) -->
  <rect x="508" y="55" width="40" height="220" rx="0" fill="#1a3020" opacity="0.25"/>
  <text x="528" y="284" font-family="ui-monospace,monospace" font-size="8" fill="#2a6a40" text-anchor="middle">target</text>
  <text x="528" y="294" font-family="ui-monospace,monospace" font-size="8" fill="#2a6a40" text-anchor="middle">zone</text>

  <!-- Bottom border -->
  <line x1="3" y1="303" x2="617" y2="303" stroke="#201c3a" stroke-width="1"/>
</svg>
