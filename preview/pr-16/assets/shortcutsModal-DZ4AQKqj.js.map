export default "<!-- S15.2 Keyboard Shortcuts Help Modal -->\n<div class=\"modal-overlay\" id=\"shortcutsModal\" aria-hidden=\"true\">\n  <div class=\"modal-box modal-box--md\">\n    <div class=\"modal-header\">\n      <h2 data-i18n=\"shortcuts_title\">קיצורי מקלדת</h2>\n      <button class=\"modal-close\" data-action=\"closeModal\" data-action-arg=\"shortcutsModal\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <table class=\"shortcuts-table\">\n        <thead>\n          <tr>\n            <th data-i18n=\"shortcuts_key\">מקש</th>\n            <th data-i18n=\"shortcuts_action\">פעולה</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr><td><kbd>Alt</kbd>+<kbd>1</kbd></td><td data-i18n=\"nav_landing\">דף נחיתה</td></tr>\n          <tr><td><kbd>Alt</kbd>+<kbd>2</kbd></td><td data-i18n=\"nav_dashboard\">לוח בקרה</td></tr>\n          <tr><td><kbd>Alt</kbd>+<kbd>3</kbd></td><td data-i18n=\"nav_guests\">אורחים</td></tr>\n          <tr><td><kbd>Alt</kbd>+<kbd>4</kbd></td><td data-i18n=\"nav_tables\">שולחנות</td></tr>\n          <tr><td><kbd>Alt</kbd>+<kbd>5</kbd></td><td data-i18n=\"nav_invitation\">הזמנה</td></tr>\n          <tr><td><kbd>Alt</kbd>+<kbd>6</kbd></td><td data-i18n=\"nav_whatsapp\">וואטסאפ</td></tr>\n          <tr><td><kbd>Alt</kbd>+<kbd>7</kbd></td><td data-i18n=\"nav_rsvp\">RSVP</td></tr>\n          <tr><td><kbd>Alt</kbd>+<kbd>8</kbd></td><td data-i18n=\"nav_budget\">תקציב</td></tr>\n          <tr><td><kbd>Alt</kbd>+<kbd>9</kbd></td><td data-i18n=\"nav_analytics\">ניתוח</td></tr>\n          <tr><td><kbd>Ctrl</kbd>+<kbd>Z</kbd></td><td data-i18n=\"shortcuts_undo\">ביטול פעולה אחרונה</td></tr>\n          <tr><td><kbd>?</kbd></td><td data-i18n=\"shortcuts_help\">פתח חלון עזרה זה</td></tr>\n        </tbody>\n      </table>\n    </div>\n    <div class=\"modal-actions\">\n      <button class=\"btn btn-secondary\" data-action=\"closeModal\" data-action-arg=\"shortcutsModal\" data-i18n=\"btn_close\">סגור</button>\n    </div>\n  </div>\n</div>\n"
