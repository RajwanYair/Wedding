export default "<!-- Personalised guest landing — querystring ?guestId=xxx -->\n<div class=\"card card--narrow guest-landing-card\">\n  <div class=\"card-header\">\n    <span class=\"icon\">💌</span>\n    <span data-i18n=\"guest_landing_title\">ההזמנה שלך</span>\n  </div>\n\n  <div class=\"guest-landing-hero u-text-center u-mb-md\">\n    <p class=\"guest-landing-greeting\" data-i18n=\"guest_landing_greeting\">\n      שלום\n    </p>\n    <h2 class=\"guest-landing-name\" data-guest-name></h2>\n  </div>\n\n  <div class=\"guest-landing-details\">\n    <div class=\"guest-landing-row\">\n      <span class=\"icon\">📅</span>\n      <span data-wedding-date></span>\n    </div>\n    <div class=\"guest-landing-row\">\n      <span class=\"icon\">🪑</span>\n      <span data-i18n=\"your_table\">השולחן שלך</span>:\n      <strong data-guest-table></strong>\n    </div>\n    <div class=\"guest-landing-row\">\n      <span class=\"icon\">✅</span>\n      <span data-i18n=\"rsvp_status_label\">סטטוס RSVP</span>:\n      <strong data-rsvp-status></strong>\n    </div>\n  </div>\n\n  <div class=\"u-text-center u-mt-md\">\n    <button\n      class=\"btn btn-primary\"\n      data-action=\"showSection\"\n      data-action-arg=\"rsvp\"\n    >\n      💌 <span data-i18n=\"landing_rsvp_cta\">אשר הגעתך</span>\n    </button>\n  </div>\n</div>\n"
