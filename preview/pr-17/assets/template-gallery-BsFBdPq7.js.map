export default "<div class=\"card\">\n  <div class=\"card-header\">\n    <span class=\"icon\">📸</span>\n    <span data-i18n=\"gallery_title\">גלריית תמונות</span>\n    <div id=\"galleryAdminBar\" class=\"admin-bar u-hidden\">\n      <label class=\"btn btn-primary btn-small u-cursor-pointer\">\n        📤 <span data-i18n=\"gallery_upload\">העלה תמונות</span>\n        <input\n          type=\"file\"\n          id=\"galleryFileInput\"\n          accept=\"image/*\"\n          multiple\n          class=\"u-hidden\"\n          data-on-change=\"handleGalleryUpload\"\n        />\n      </label>\n    </div>\n  </div>\n  <div id=\"galleryEmpty\" class=\"budget-empty\">\n    <span class=\"empty-emoji-lg\">📷</span>\n    <p data-i18n=\"gallery_empty\">אין תמונות עדיין. העלה תמונות האירוע.</p>\n  </div>\n  <div id=\"galleryGrid\" class=\"gallery-grid\"></div>\n</div>\n"
