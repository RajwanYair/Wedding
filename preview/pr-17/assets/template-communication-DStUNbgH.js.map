export default "<!-- src/templates/communication.html — Communication Hub (Phase 10.2) -->\n<div class=\"section-header\">\n  <h2 class=\"section-title\">\n    <span class=\"icon\">💬</span>\n    <span data-i18n=\"nav_communication\">מרכז תקשורת</span>\n  </h2>\n  <p class=\"section-desc\" data-i18n=\"comm_desc\">\n    תור הודעות תודה · יומן שליחות · WhatsApp Cloud API\n  </p>\n</div>\n\n<!-- Stats row -->\n<div id=\"commStats\" class=\"analytics-headcount-grid u-mb-sm\"></div>\n\n<!-- Actions -->\n<div class=\"settings-btn-row u-mb-sm\">\n  <button class=\"btn btn-primary\" data-action=\"commAddSample\">\n    ➕ <span data-i18n=\"comm_add_sample_btn\">הוסף דוגמה</span>\n  </button>\n  <button class=\"btn btn-secondary\" data-action=\"clearCommLog\">\n    🗑️ <span data-i18n=\"comm_clear_btn\">נקה יומן</span>\n  </button>\n</div>\n\n<!-- Communication log -->\n<div class=\"card analytics-card--full\">\n  <div class=\"card-header\">\n    <span class=\"icon\">📋</span>\n    <span data-i18n=\"comm_log_title\">יומן שליחות</span>\n  </div>\n  <div id=\"commLogList\" class=\"comm-log-list\"></div>\n</div>\n"
