<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8b5cf6" />
    <title>אין חיבור לרשת — מנהל החתונה</title>
    <style>
      *,
      *::before,
      *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --accent: #8b5cf6;
        --accent-2: #6d28d9;
        --surface: #ffffff;
        --text: #1e1b4b;
        --muted: #6b7280;
        --radius: 1rem;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --surface: #1a1625;
          --text: #ede9fe;
          --muted: #a78bfa;
        }
      }

      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 50%, #c4b5fd 100%);
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        color: var(--text);
        padding: 1.5rem;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(135deg, #1a0033 0%, #2d1b69 50%, #1e1035 100%);
        }
      }

      .card {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: 0 20px 60px rgb(0 0 0 / 0.15);
        padding: 3rem 2.5rem;
        max-width: 36rem;
        width: 100%;
        text-align: center;
      }

      .icon {
        font-size: 4rem;
        line-height: 1;
        margin-block-end: 1.5rem;
      }

      h1 {
        font-size: clamp(1.4rem, 4vw, 1.9rem);
        font-weight: 700;
        margin-block-end: 0.75rem;
        color: var(--accent-2);
      }

      p {
        color: var(--muted);
        line-height: 1.65;
        margin-block-end: 1rem;
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-block-start: 2rem;
      }

      button {
        cursor: pointer;
        border: none;
        border-radius: 0.6rem;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      button:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 2px;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgb(139 92 246 / 0.4);
      }

      .btn-secondary {
        background: transparent;
        border: 2px solid var(--accent);
        color: var(--accent);
      }

      .btn-secondary:hover {
        background: var(--accent);
        color: #fff;
      }

      @media (prefers-reduced-motion: reduce) {
        button { transition: none; }
        button:hover { transform: none; }
      }
    </style>
  </head>
  <body>
    <div class="card" role="main">
      <div class="icon" aria-hidden="true">📡</div>
      <h1>אין חיבור לאינטרנט</h1>
      <p>
        נראה שהינך לא מחובר לרשת כרגע.<br />
        בדוק את החיבור שלך ונסה שוב.
      </p>
      <p>
        ניתן עדיין למלא טופס <strong>RSVP</strong> — הוא יישלח אוטומטית
        ברגע שהחיבור יחזור.
      </p>
      <div class="actions">
        <button class="btn-primary" onclick="location.reload()" type="button">
          נסה שוב
        </button>
        <button class="btn-secondary" onclick="history.back()" type="button">
          חזור
        </button>
      </div>
    </div>
  </body>
</html>
