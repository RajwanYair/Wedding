<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8864e"/>
      <stop offset="50%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#b8864e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="78" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>

  <!-- Wedding Rings -->
  <circle cx="226" cy="200" r="55" fill="none" stroke="#d4a574" stroke-width="5" opacity="0.85"/>
  <circle cx="286" cy="200" r="55" fill="none" stroke="#d4a574" stroke-width="5" opacity="0.85"/>

  <!-- Heart -->
  <path d="M256 175 C256 155, 230 130, 210 150 C190 170, 210 200, 256 240 C302 200, 322 170, 302 150 C282 130, 256 155, 256 175Z" fill="#e8a0b4" opacity="0.6"/>

  <!-- Diamond sparkle -->
  <path d="M256 120 L262 140 L280 146 L262 152 L256 172 L250 152 L232 146 L250 140Z" fill="#f0dcc4" opacity="0.7"/>

  <!-- Text: Wedding -->
  <text x="256" y="310" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#f0dcc4" font-weight="400">Wedding</text>

  <!-- Text: Manager -->
  <text x="256" y="355" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#d4a574" opacity="0.8">Manager</text>

  <!-- Hebrew -->
  <text x="256" y="400" text-anchor="middle" font-family="'Segoe UI', Tahoma, Arial, sans-serif" font-size="24" fill="#d4a574" opacity="0.6">ניהול חתונה</text>

  <!-- Bottom ornament -->
  <path d="M150 440 Q200 470 256 440 Q312 470 362 440" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  <path d="M170 455 Q213 475 256 455 Q299 475 342 455" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.25"/>
</svg>
