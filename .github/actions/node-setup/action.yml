name: "Setup Node.js with cache and npm ci"
description: "Checkout code, setup Node.js with npm cache, and install dependencies."

inputs:
  node-version:
    description: "Node.js version to use"
    default: "22"
    required: false
  install-args:
    description: "Additional arguments to pass to npm ci (e.g. --omit=dev)"
    default: ""
    required: false

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"

    - name: Install dependencies
      shell: bash
      run: npm ci ${{ inputs.install-args }}
