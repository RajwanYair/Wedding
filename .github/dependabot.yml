version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Jerusalem"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"
    reviewers:
      - "RajwanYair"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "Asia/Jerusalem"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "devDependencies"
    reviewers:
      - "RajwanYair"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      lint-tools:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "stylelint*"
          - "htmlhint"
          - "markdownlint*"
      test-tools:
        patterns:
          - "vitest*"
          - "@vitest/*"
          - "playwright*"
          - "@playwright/*"
          - "@axe-core/*"
      build-tools:
        patterns:
          - "vite*"
          - "@vitejs/*"
