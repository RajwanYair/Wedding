# Mobile beta distribution (TestFlight + Play Internal) — S580
# Triggered by version tags (v*.*.*) — never on PRs or main pushes.
# Reuses artifacts from mobile-build.yml when available, otherwise rebuilds.
name: Mobile Distribute (Beta)

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      track:
        description: "Distribution track"
        required: true
        default: "internal"
        type: choice
        options: [internal, alpha, beta, production]

permissions:
  contents: read

concurrency:
  group: mobile-distribute-${{ github.ref }}
  cancel-in-progress: false

jobs:
  testflight:
    name: TestFlight upload
    runs-on: macos-15
    timeout-minutes: 45
    if: ${{ secrets.APPSTORE_API_KEY_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Add iOS platform
        run: npx cap add ios || true
      - run: npx cap sync ios
      - name: Set up signing
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$P12_BASE64" | base64 -d > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
        shell: bash
      - name: Archive + export .ipa
        working-directory: ios/App
        env:
          IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive archive \
            CODE_SIGN_IDENTITY="$IDENTITY" DEVELOPMENT_TEAM="$TEAM_ID"
          cat > $RUNNER_TEMP/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF
          xcodebuild -exportArchive -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/export -exportOptionsPlist $RUNNER_TEMP/exportOptions.plist
        shell: bash
      - name: Upload to TestFlight
        env:
          API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          xcrun altool --upload-app -t ios -f $RUNNER_TEMP/export/App.ipa \
            --apiKey "$API_KEY_ID" --apiIssuer "$API_ISSUER_ID"
        shell: bash

  play-internal:
    name: Play ${{ inputs.track || 'internal' }} upload
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ secrets.PLAY_STORE_JSON != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: npx cap add android || true
      - run: npx cap sync android
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
        shell: bash
      - name: Build AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon
      - name: Upload to Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON }}
          packageName: com.rajwanyair.wedding
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track || 'internal' }}
          status: completed
          whatsNewDirectory: store/android/whatsnew
