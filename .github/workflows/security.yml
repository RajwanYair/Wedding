# Sprint 61 — B10: Unified Security Workflow
# Orchestrates SBOM generation, Trivy CVE scan, and OpenSSF Scorecard
# as a single named workflow with a clear status gate for PRs.
#
# Individual detailed workflows (sbom.yml, trivy.yml, scorecard.yml) continue
# to run on their own schedules. This workflow adds:
#   1. A combined status check that PRs can require ("Security / gate")
#   2. npm audit --audit-level=moderate (stricter than CI's --high)
#   3. Supply-chain integrity: verifies no unexpected new package additions
#
# Triggers: push to main, all PRs, weekly cron
name: Security

on:
  schedule:
    - cron: "47 6 * * 1" # Mondays 06:47 UTC — after sbom/trivy/scorecard
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 1. npm audit ────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit (moderate+)
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/node-setup

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  # ── 2. Dependency diff (supply-chain integrity) ───────────────────────────
  dep-diff:
    name: Dependency integrity check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install and capture dependency list
        run: |
          npm ci --omit=dev
          npm ls --depth=0 --json > deps-pr.json

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base-branch

      - name: Install base dependencies
        working-directory: base-branch
        run: npm ci --omit=dev

      - name: Capture base dependency list
        working-directory: base-branch
        run: npm ls --depth=0 --json > ../deps-base.json

      - name: Compare production dependency counts
        run: |
          PR_COUNT=$(node -e "const d=require('./deps-pr.json'); console.log(Object.keys(d.dependencies||{}).length)")
          BASE_COUNT=$(node -e "const d=require('./deps-base.json'); console.log(Object.keys(d.dependencies||{}).length)")
          echo "Base production deps: $BASE_COUNT"
          echo "PR production deps:   $PR_COUNT"
          if [ "$PR_COUNT" -gt "$BASE_COUNT" ]; then
            echo "::warning::PR adds $((PR_COUNT - BASE_COUNT)) new production dependency(ies). Please review."
          fi

  # ── 3. Security scan (inline scripts / innerHTML / eval) ─────────────────
  inline-scan:
    name: Source security scan
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/node-setup

      - name: Run custom security audit
        run: npm run audit:security

  # ── 4. Summary gate ─────────────────────────────────────────────────────────
  # This job runs last and fails if any required job failed.
  # Branch protection can require "Security / gate" without needing to list
  # each individual job.
  gate:
    name: gate
    runs-on: ubuntu-latest
    needs: [npm-audit, inline-scan]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ needs.npm-audit.result }}" != "success" ]]; then
            echo "npm-audit failed"
            exit 1
          fi
          if [[ "${{ needs.inline-scan.result }}" != "success" ]]; then
            echo "inline-scan failed"
            exit 1
          fi
          echo "All security checks passed"
