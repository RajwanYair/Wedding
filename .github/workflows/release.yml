# =============================================================================
# Release — Auto-create GitHub Releases on version tags (vX.Y.Z)
# =============================================================================
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Package dist
        run: |
          cd dist
          zip -r ../wedding-dist.zip .
          cd ..
          sha256sum wedding-dist.zip > wedding-dist.zip.sha256

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: "Wedding Manager ${{ steps.version.outputs.tag }}"
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Quick Start
            Open [index.html](https://rajwanyair.github.io/Wedding) in your browser — no installation required.
          files: |
            wedding-dist.zip
            wedding-dist.zip.sha256
            index.html
            public/sw.js
            public/manifest.json
            public/wedding.json

