# =============================================================================
# Deploy to GitHub Pages
# =============================================================================
name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Inject GitHub Secrets into config
        env:
          GH_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_FB_APP_ID: ${{ secrets.FB_APP_ID }}
          GH_APPLE_SERVICE_ID: ${{ secrets.APPLE_SERVICE_ID }}
          GH_SHEETS_WEBAPP_URL: ${{ secrets.SHEETS_WEBAPP_URL }}
          GH_SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: node scripts/inject-config.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
