# =============================================================================
# Deploy to GitHub Pages
# =============================================================================
name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Inject GitHub Secrets into config
        env:
          GH_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_FB_APP_ID: ${{ secrets.FB_APP_ID }}
          GH_APPLE_SERVICE_ID: ${{ secrets.APPLE_SERVICE_ID }}
          GH_SHEETS_WEBAPP_URL: ${{ secrets.SHEETS_WEBAPP_URL }}
          GH_SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GH_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          GH_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GH_BACKEND_TYPE: ${{ secrets.BACKEND_TYPE }}
          GH_ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
        run: node scripts/inject-config.mjs

      - name: Build with Vite
        env:
          VITE_GLITCHTIP_DSN: ${{ secrets.GLITCHTIP_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      # S5.10: Post-deploy verification ─────────────────────────────────────
      - name: Verify deployment health
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          echo "Checking ${PAGE_URL} ..."
          # Retry up to 6 times (0s, 5s, 10s, 20s, 40s, 80s) — Pages can take ~1 min
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -sSo /dev/null -w "%{http_code}" \
              --max-time 15 --retry 0 "${PAGE_URL}" || echo "000")
            echo "  attempt ${i}: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "Deployment verified — ${PAGE_URL} returned HTTP 200."
              exit 0
            fi
            [ "$i" -lt 6 ] && sleep $((5 * 2**(i-1)))
          done
          echo "::error::Deployment health check failed — ${PAGE_URL} did not return HTTP 200 after 6 attempts."
          exit 1
