# Generate Linux Playwright visual-regression baselines.
#
# Visual snapshots are platform-specific (`-linux.png`) and must be generated
# on the same OS that the CI E2E job runs on. Developers on macOS / Windows
# cannot produce them locally. This workflow runs on demand, generates the
# baselines on Ubuntu, and commits them back to `tests/e2e/*-snapshots/`.
#
# Trigger: workflow_dispatch (manual). Use after intentional UI changes.
name: Visual Regression Baselines

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update baselines on"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build production bundle (root-served for preview)
        env:
          VITE_BASE: "/"
        run: npm run build

      - name: Update visual snapshots
        run: npx playwright test tests/e2e/visual.spec.mjs --update-snapshots
        continue-on-error: false

      - name: Commit and push baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/*-snapshots/ || true
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "test(e2e): refresh visual regression baselines"
            git push origin HEAD:${{ inputs.branch }}
          fi
