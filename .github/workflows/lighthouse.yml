# Lighthouse CI — performance + a11y + best-practices regression gate (ROADMAP §5 Phase B)
#
# Runs on PRs and main. Builds the production bundle, serves it, and runs
# Lighthouse against the public sections. Hard gates can be enabled later by
# bumping minScore values.
name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle for Lighthouse
        # Override base path: GH Pages deploys under /Wedding/, but lhci
        # serves staticDistDir at /. Without this override every asset 404s
        # and Lighthouse measures a broken page.
        env:
          VITE_BASE: "/"
        run: npm run build

      - name: Install Lighthouse CI
        run: npm i -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun --config=.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          retention-days: 14
