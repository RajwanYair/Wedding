# Lighthouse CI — performance + a11y + best-practices regression gate (ROADMAP §5 Phase B)
#
# Runs on PRs and main. Builds the production bundle, serves it, and runs
# Lighthouse against the public sections. Hard gates can be enabled later by
# bumping minScore values.
name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        locale: [he, en, ar, ru]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle for Lighthouse
        env:
          VITE_BASE: "/"
        run: npm run build

      - name: Generate per-locale LH config
        run: |
          node -e "
            import('file://' + process.cwd() + '/src/services/lighthouse-config.js')
              .then(m => {
                const cfg = m.buildLighthouseConfig('${{ matrix.locale }}');
                require('fs').writeFileSync('.lighthouserc-locale.json', JSON.stringify(cfg, null, 2));
              });
          "

      - name: Install Lighthouse CI
        run: npm i -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI (${{ matrix.locale }})
        run: lhci autorun --config=.lighthouserc-locale.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse artifact (${{ matrix.locale }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports-${{ matrix.locale }}
          path: .lighthouseci
          retention-days: 14
