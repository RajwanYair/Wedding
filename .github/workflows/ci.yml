# =============================================================================
# CI — Wedding Manager v29.0.0
# Lint, i18n parity, unit tests, Vite build, security scan, Lighthouse, size, E2E
# =============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup shared tooling (CI shim)
        run: node scripts/ensure-shared-tooling.mjs

      - name: Lint (HTML + CSS + JS + Markdown)
        run: npm run lint

      - name: Validate i18n parity
        run: npm run check:i18n

      - name: Check credential hygiene
        run: npm run check:credentials

      - name: Audit action namespace — ratchet gate (baseline=116 flat, 0 duplicates — S291)
        run: npm run audit:actions

      - name: Audit modal native-dialog adoption (enforce baseline=10 — S233)
        run: node scripts/audit-modals.mjs --baseline=10

      - name: Audit BaseSection adoption — all 23 sections enforced (S296)
        run: node scripts/audit-base-section.mjs --enforce

      - name: Audit CSS @scope — no bare [data-section] selectors (enforce BASELINE=0 — S297)
        run: node scripts/audit-css-scope.mjs --enforce

      - name: Audit console.error usage — enforce BASELINE=0 (ADR-032 — S298)
        run: node scripts/audit-console-error.mjs --enforce

      - name: Validate Mermaid diagrams (enforce — S236)
        run: node scripts/validate-mermaid.mjs --enforce

      - name: Audit JSDoc coverage (enforce 100% — S236)
        run: node scripts/audit-jsdoc.mjs --enforce

      - name: Audit Supabase migrations (enforce — S243)
        run: node scripts/audit-supabase-migrations.mjs --enforce

      - name: Supabase SQL lint — BASELINE=0 (S304: 008 fixed with DO block guard)
        run: node scripts/audit-supabase-lint.mjs --enforce

      - name: Architecture check — no section→service direct imports (enforce — S290)
        run: node scripts/arch-check.mjs --strict

      - name: Audit Trusted Types sinks — enforce baseline=19 ratchet (S318-S321)
        run: node scripts/audit-trusted-types.mjs --baseline=5

      - name: Validate Trusted Types + CSP directives present (enforce — S244)
        run: |
          if ! grep -q "require-trusted-types-for 'script'" public/_headers; then
            echo "::error file=public/_headers::Missing require-trusted-types-for 'script' CSP directive"
            exit 1
          fi
          if ! grep -q "trusted-types wedding-html" public/_headers; then
            echo "::error file=public/_headers::Missing trusted-types policy name in CSP"
            exit 1
          fi
          if ! grep -q "wss://\*\.supabase\.co" index.html; then
            echo "::error file=index.html::Meta CSP missing wss://*.supabase.co in connect-src (S384)"
            exit 1
          fi
          echo "Trusted Types CSP directives verified."

      - name: Unit tests (Vitest)
        run: npm test
        env:
          NODE_NO_WARNINGS: "1"

      - name: Vite build
        run: npm run build

      - name: Guard — no manualChunks in vite.config.js (S385)
        run: |
          if grep -q "manualChunks" vite.config.js; then
            echo "::error file=vite.config.js::manualChunks must not be defined — use dynamic import() boundaries instead (S385)"
            exit 1
          fi
          echo "vite.config.js: no manualChunks — auto code-splitting verified."

      - name: Coverage report
        if: matrix.node-version == '22'
        run: npm run test:coverage
        env:
          NODE_NO_WARNINGS: "1"
        # S6.11: Coverage gate is enforced — failures block CI

      - name: Coverage gate (check-coverage-gate)
        if: matrix.node-version == '22'
        run: npm run check:coverage
        # S379: Advisory gate ratcheted to 58/51/66/58; exits 1 on violation

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Check for dangerous JS patterns
        run: |
          FAILED=0
          for f in $(find src/ -name '*.js' -o -name '*.ts') index.html; do
            if grep -n "eval(" "$f"; then
              echo "::error file=$f::eval() usage detected"
              FAILED=1
            fi
            if grep -n "document\.write(" "$f"; then
              echo "::error file=$f::document.write() detected"
              FAILED=1
            fi
          done
          # Scan HTML templates and modals for innerHTML / eval
          for f in $(find src/templates/ src/modals/ -name '*.html' 2>/dev/null); do
            if grep -n "innerHTML" "$f"; then
              echo "::error file=$f::innerHTML usage detected in template"
              FAILED=1
            fi
            if grep -n "eval(" "$f"; then
              echo "::error file=$f::eval() usage detected in template"
              FAILED=1
            fi
            if grep -n "javascript:" "$f"; then
              echo "::error file=$f::javascript: URI detected in template"
              FAILED=1
            fi
            if grep -n "on[a-z]*=" "$f"; then
              echo "::warning file=$f::Inline event handler detected (prefer data-action)"
            fi
          done
          # Check index.html has no inline scripts (CSP moved to _headers)
          if grep -Pn '<script>[^<]' index.html; then
            echo "::error file=index.html::Inline script detected — use external files only (CSP disallows inline)"
            FAILED=1
          fi
          [ "$FAILED" -eq 0 ] && echo "Security scan passed."
          exit $FAILED

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    # Run after lint+test passes; only on pushes to main (post-deploy)
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli@0.14.0

      - name: Run Lighthouse CI
        run: lhci autorun --config=.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  size-report:
    name: Bundle Size Report
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate size report
        run: node scripts/size-report.mjs | tee size-report.txt

      - name: Bundle size budget gate
        run: |
          # Fail CI if main bundle exceeds 50 KB gzip (target: <30 KB, hard limit: 50 KB)
          npm run build 2>/dev/null || true
          MAIN_SIZE=$(find dist/assets -name '*.js' -type f -exec gzip -c {} \; | wc -c | sort -rn | head -1)
          MAIN_KB=$((MAIN_SIZE / 1024))
          echo "Largest JS chunk: ${MAIN_KB} KB gzip"
          if [ "$MAIN_KB" -gt 50 ]; then
            echo "::error::Bundle size ${MAIN_KB} KB exceeds 50 KB budget"
            exit 1
          fi
          echo "Bundle size within budget."

      - name: Upload size report artifact
        uses: actions/upload-artifact@v4
        with:
          name: size-report
          path: size-report.txt
          retention-days: 30

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7



