# =============================================================================
# CI — Wedding Manager
# Lint (HTML + CSS + JS + Markdown), unit tests, security scan
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (HTML + CSS + JS + MD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint JS
        run: npm run lint:js

      - name: Lint Markdown
        run: npm run lint:md

  unit-tests:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run unit tests
        run: node --test tests/wedding.test.mjs

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn "api_key\|apiKey\|secret\|password\|token" index.html | grep -v "//.*api_key\|//.*secret"; then
            echo "::warning::Potential secrets found in source code"
          else
            echo "No hardcoded secrets detected"
          fi

      - name: Check for dangerous patterns
        run: |
          echo "Scanning for dangerous JavaScript patterns..."
          FAILED=0
          if grep -n "eval(" index.html; then
            echo "::error::eval() usage detected"
            FAILED=1
          fi
          if grep -n "document\.write(" index.html; then
            echo "::error::document.write() detected"
            FAILED=1
          fi
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "No dangerous patterns found"
