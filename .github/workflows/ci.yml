# =============================================================================
# CI — Wedding Manager v9.1.0
# Lint, i18n parity, unit tests, Vite build, security scan, Lighthouse, size, E2E
# =============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup shared tooling (CI shim)
        run: node scripts/ensure-shared-tooling.mjs

      - name: Lint (HTML + CSS + JS + Markdown)
        run: npm run lint

      - name: Validate i18n parity
        run: npm run check:i18n

      - name: Check credential hygiene
        run: npm run check:credentials

      - name: Security scan (innerHTML / eval / http:// patterns)
        run: npm run audit:security

      - name: Section contract validation
        run: npm run audit:sections

      - name: Unit tests (Vitest)
        run: npm test
        env:
          NODE_NO_WARNINGS: "1"

      - name: Vite build
        run: npm run build

      - name: Coverage report
        if: matrix.node-version == '22'
        run: npm run test:coverage
        env:
          NODE_NO_WARNINGS: "1"
        # S6.11: Coverage gate is enforced — failures block CI

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Check for dangerous JS patterns
        run: |
          node scripts/ensure-shared-tooling.mjs
          node scripts/security-scan.mjs

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    # Run after lint+test passes; only on pushes to main (post-deploy)
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli@0.14.0

      - name: Run Lighthouse CI
        run: lhci autorun --config=.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  size-report:
    name: Bundle Size Report
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate size report
        run: node scripts/size-report.mjs | tee size-report.txt

      - name: Bundle size budget gate
        run: |
          # Fail CI if main bundle exceeds 50 KB gzip (target: <30 KB, hard limit: 50 KB)
          npm run build 2>/dev/null || true
          MAIN_SIZE=$(find dist/assets -name '*.js' -type f -exec gzip -c {} \; | wc -c | sort -rn | head -1)
          MAIN_KB=$((MAIN_SIZE / 1024))
          echo "Largest JS chunk: ${MAIN_KB} KB gzip"
          if [ "$MAIN_KB" -gt 50 ]; then
            echo "::error::Bundle size ${MAIN_KB} KB exceeds 50 KB budget"
            exit 1
          fi
          echo "Bundle size within budget."

      - name: Upload size report artifact
        uses: actions/upload-artifact@v4
        with:
          name: size-report
          path: size-report.txt
          retention-days: 30

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7



