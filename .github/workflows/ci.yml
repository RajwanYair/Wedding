# =============================================================================
# CI — Wedding Manager v11.5.0
# Lint, i18n parity, unit tests, Vite build, security scan, Lighthouse, size, E2E
# =============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup shared tooling (CI shim)
        run: node scripts/ensure-shared-tooling.mjs

      - name: Lint (HTML + CSS + JS + Markdown)
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Validate i18n parity
        run: npm run check:i18n

      - name: Check credential hygiene
        run: npm run check:credentials

      - name: Security scan (innerHTML / eval / http:// patterns)
        run: npm run audit:security

      - name: Section contract validation
        run: npm run audit:sections

      - name: Unit tests (Vitest)
        run: npm test
        env:
          NODE_NO_WARNINGS: "1"

      - name: Vite build
        run: npm run build

      - name: Coverage report
        if: matrix.node-version == '22'
        run: npm run test:coverage
        env:
          NODE_NO_WARNINGS: "1"
        # S6.11: Coverage gate is enforced — failures block CI

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Check for dangerous JS patterns
        run: |
          node scripts/ensure-shared-tooling.mjs
          node scripts/security-scan.mjs

  size-report:
    name: Bundle Size Report
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate size report
        run: node scripts/size-report.mjs | tee size-report.txt

      - name: Bundle size budget gate
        run: |
          # Fail CI if any single JS chunk exceeds 50 KB gzip (target: <30 KB, hard limit: 50 KB)
          npm run build 2>/dev/null || true
          FAILED=0
          while IFS= read -r file; do
            SIZE=$(gzip -c "$file" | wc -c)
            KB=$((SIZE / 1024))
            echo "  $(basename "$file"): ${KB} KB gzip"
            if [ "$KB" -gt 50 ]; then
              echo "::error::Chunk $(basename "$file") is ${KB} KB — exceeds 50 KB gzip budget"
              FAILED=1
            fi
          done < <(find dist/assets -name '*.js' -type f)
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "All chunks within 50 KB gzip budget."

      - name: Upload size report artifact
        uses: actions/upload-artifact@v4
        with:
          name: size-report
          path: size-report.txt
          retention-days: 30

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # Install all engines exercised by playwright.config.mjs:
        # chromium · firefox · webkit (Desktop Safari + iPad Mini land.) · iPhone 14 (chromium)
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build production bundle
        # VITE_BASE=/ overrides the GH-Pages /Wedding/ base so the preview
        # server (started by Playwright) responds at the host root, matching
        # absolute goto("/...") calls in tests.
        env:
          VITE_BASE: "/"
        run: npm run build

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7



