# =============================================================================
# CI — Wedding Manager v4.7.0
# Lint (HTML + CSS + JS + Markdown), unit tests, Vite build, security scan,
# =============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (HTML + CSS + JS + Markdown)
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test
        env:
          NODE_NO_WARNINGS: "1"

      - name: Vite build
        run: npm run build

      - name: Coverage report
        if: matrix.node-version == '22'
        run: npm run test:coverage
        env:
          NODE_NO_WARNINGS: "1"
        # S6.11: Coverage gate is enforced — failures block CI

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Check for dangerous JS patterns
        run: |
          FAILED=0
          for f in js/*.js index.html; do
            if grep -n "eval(" "$f"; then
              echo "::error file=$f::eval() usage detected"
              FAILED=1
            fi
            if grep -n "document\.write(" "$f"; then
              echo "::error file=$f::document.write() detected"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] && echo "Security scan passed."
          exit $FAILED

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    # Run after lint+test passes; only on pushes to main (post-deploy)
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli@0.14.0

      - name: Run Lighthouse CI
        run: lhci autorun --config=.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  size-report:
    name: Bundle Size Report
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate size report
        run: node scripts/size-report.mjs | tee size-report.txt

      - name: Upload size report artifact
        uses: actions/upload-artifact@v4
        with:
          name: size-report
          path: size-report.txt
          retention-days: 30

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

