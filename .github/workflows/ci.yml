# =============================================================================
# CI — Wedding Manager v1.3.0
# Lint (HTML + CSS + JS + Markdown), unit tests, security scan
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (HTML + CSS + JS + Markdown)
        run: npm run lint

      - name: Unit tests
        run: node --test tests/wedding.test.mjs

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for dangerous JS patterns
        run: |
          FAILED=0
          for f in js/*.js index.html; do
            if grep -n "eval(" "$f"; then
              echo "::error file=$f::eval() usage detected"
              FAILED=1
            fi
            if grep -n "document\.write(" "$f"; then
              echo "::error file=$f::document.write() detected"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] && echo "Security scan passed."
          exit $FAILED

