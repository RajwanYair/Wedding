# OpenSSF Scorecard supply-chain analysis.
# Runs weekly + on default-branch push. Publishes SARIF to GitHub Security
# tab and (when enabled) to the OpenSSF API for the public Scorecard badge.
#
# Docs: https://github.com/ossf/scorecard-action
name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "27 6 * * 1" # Mondays 06:27 UTC
  push:
    branches: ["main"]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
