# Capacitor 6 mobile build matrix (S575)
# - iOS build runs on macOS-15 with Xcode 16; signs only when secrets present.
# - Android build runs on ubuntu-latest; signs with keystore secrets when set.
# - PRs from forks skip signing (build only) to avoid leaking certs.
name: Mobile Build (Capacitor)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    paths:
      - "capacitor.config.json"
      - "src/native/**"
      - ".github/workflows/mobile-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (build${{ secrets.ANDROID_KEYSTORE_BASE64 && ' + sign' || '' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Add Android platform
        run: npx cap add android || true
      - run: npx cap sync android
      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
        shell: bash
      - name: Build AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: wedding-android-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: ignore
          retention-days: 14

  ios:
    name: iOS (build${{ secrets.IOS_P12_BASE64 && ' + sign' || '' }})
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Add iOS platform
        run: npx cap add ios || true
      - run: npx cap sync ios
      - name: Import signing certificate
        if: ${{ secrets.IOS_P12_BASE64 != '' }}
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$P12_BASE64" | base64 -d > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
        shell: bash
      - name: Build .ipa (archive)
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive archive \
            CODE_SIGN_IDENTITY="${{ secrets.IOS_CODE_SIGN_IDENTITY || '-' }}" \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID || '' }}" \
            CODE_SIGNING_ALLOWED=${{ secrets.IOS_P12_BASE64 && 'YES' || 'NO' }}
        shell: bash
      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: wedding-ios-archive
          path: ${{ runner.temp }}/App.xcarchive
          if-no-files-found: ignore
          retention-days: 14
