name: 🐛 Bug Report
description: Something is broken or behaving unexpectedly
title: "bug: "
labels: ["bug", "triage"]
assignees:
  - RajwanYair
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in as much detail as you can.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: dropdown
    id: section
    attributes:
      label: Section Affected
      options:
        - dashboard
        - guests
        - tables
        - rsvp
        - invitation
        - whatsapp
        - budget
        - analytics
        - timeline
        - gallery
        - checkin
        - settings
        - vendors
        - expenses
        - auth
        - other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser + Version
      placeholder: "Chrome 128, Firefox 130, Safari 17..."
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: UI Language
      options:
        - Hebrew
        - English
        - Arabic
        - Russian
  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: Paste any browser console errors here.
      render: text
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, links, or any other relevant information.
