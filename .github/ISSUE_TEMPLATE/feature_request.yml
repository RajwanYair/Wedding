name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "feat: "
labels: ["enhancement"]
assignees:
  - RajwanYair
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe it as clearly as possible.
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Who benefits?
      placeholder: As a user, I want to...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered and why you prefer yours.
  - type: textarea
    id: implementation
    attributes:
      label: Implementation Notes
      description: Any technical guidance, API suggestions, or constraints.
  - type: checkboxes
    id: acceptance
    attributes:
      label: Acceptance Criteria
      options:
        - label: Feature works correctly in Hebrew RTL layout
        - label: Feature works correctly in English LTR layout
        - label: New i18n keys added to both he.json and en.json
        - label: No new innerHTML usage with unsanitized data
        - label: Lint passes (0 errors, 0 warnings)
        - label: Tests added/updated
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical (blocks release)
        - High
        - Medium
        - Low / Nice to have
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Roadmap Phase
      description: Which roadmap phase does this belong to?
      options:
        - Phase 1 (v8.3.x — Backend & foundation)
        - Phase 2 (v8.4.x — Tooling & DX)
        - Phase 3 (v9.0.x — UX & AI features)
        - Phase 4 (v10.x — Scale & enterprise)
        - Not on roadmap
