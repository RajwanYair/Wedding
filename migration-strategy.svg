<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 195" role="img" aria-label="Migration Strategy — 3-Phase Git Branching">
  <!-- Background -->
  <rect width="760" height="195" rx="12" fill="#161121"/>

  <!-- Title -->
  <text x="380" y="22" font-family="ui-monospace,monospace" font-size="11" font-weight="700" fill="#d4a574" text-anchor="middle" letter-spacing="0.5">MIGRATION STRATEGY — 3-PHASE GIT BRANCHING</text>

  <!-- Phase background regions -->
  <!-- P1: x=45..245, P2: x=245..520, P3: x=520..710 -->
  <rect x="45" y="35" width="200" height="120" rx="6" fill="#1a1430" opacity="0.6"/>
  <rect x="245" y="35" width="275" height="120" rx="6" fill="#0f1828" opacity="0.6"/>
  <rect x="520" y="35" width="190" height="120" rx="6" fill="#0c1e14" opacity="0.6"/>

  <!-- Phase labels -->
  <text x="145" y="52" font-family="ui-monospace,monospace" font-size="9" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="0.5">PHASE 1</text>
  <text x="145" y="64" font-family="ui-monospace,monospace" font-size="8.5" fill="#6b5fa0" text-anchor="middle">Parallel Build</text>

  <text x="383" y="52" font-family="ui-monospace,monospace" font-size="9" font-weight="700" fill="#60a5fa" text-anchor="middle" letter-spacing="0.5">PHASE 2</text>
  <text x="383" y="64" font-family="ui-monospace,monospace" font-size="8.5" fill="#3a6a8a" text-anchor="middle">Feature Freeze on main</text>

  <text x="615" y="52" font-family="ui-monospace,monospace" font-size="9" font-weight="700" fill="#4ade80" text-anchor="middle" letter-spacing="0.5">PHASE 3</text>
  <text x="615" y="64" font-family="ui-monospace,monospace" font-size="8.5" fill="#2a6a3a" text-anchor="middle">Cutover &amp; Deploy</text>

  <!-- Phase dividers -->
  <line x1="245" y1="35" x2="245" y2="165" stroke="#3f3560" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="520" y1="35" x2="520" y2="165" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ── MAIN BRANCH (y=100) ── -->
  <!-- Solid active section (P1) -->
  <line x1="55" y1="100" x2="245" y2="100" stroke="#d4a574" stroke-width="2.5"/>
  <!-- Dashed frozen section (P2) -->
  <line x1="245" y1="100" x2="520" y2="100" stroke="#6b5030" stroke-width="2" stroke-dasharray="7,5"/>
  <!-- Solid resumed section (P3) -->
  <line x1="520" y1="100" x2="695" y2="100" stroke="#d4a574" stroke-width="2.5"/>
  <!-- Arrow at end -->
  <polygon points="697,100 689,95.5 689,104.5" fill="#d4a574"/>

  <!-- main "frozen" label above dashed section -->
  <text x="383" y="93" font-family="ui-monospace,monospace" font-size="8" fill="#4a3820" text-anchor="middle">— frozen, no new features —</text>

  <!-- Main branch nodes -->
  <circle cx="90" cy="100" r="5" fill="#d4a574" stroke="#161121" stroke-width="2"/>
  <circle cx="245" cy="100" r="5" fill="#d4a574" stroke="#161121" stroke-width="2"/>
  <circle cx="520" cy="100" r="5" fill="#4ade80" stroke="#161121" stroke-width="2"/>
  <circle cx="670" cy="100" r="5" fill="#4ade80" stroke="#161121" stroke-width="2"/>

  <!-- ── V2 BRANCH (y=148) ── -->
  <!-- Fork curve from main at x=245 down to v2 line at x=265 -->
  <path d="M245,100 C258,100 258,148 272,148" stroke="#a78bfa" stroke-width="2" fill="none"/>
  <!-- Straight v2 section -->
  <line x1="272" y1="148" x2="501" y2="148" stroke="#a78bfa" stroke-width="2"/>
  <!-- Merge curve from v2 at x=501 up to main at x=520 -->
  <path d="M501,148 C512,148 520,116 520,100" stroke="#a78bfa" stroke-width="2" fill="none"/>

  <!-- v2 branch nodes -->
  <circle cx="272" cy="148" r="4" fill="#a78bfa" stroke="#161121" stroke-width="2"/>
  <circle cx="383" cy="148" r="4" fill="#a78bfa" stroke="#161121" stroke-width="2"/>
  <circle cx="501" cy="148" r="4" fill="#a78bfa" stroke="#161121" stroke-width="2"/>

  <!-- v2 activity label -->
  <text x="383" y="164" font-family="ui-monospace,monospace" font-size="8.5" fill="#8b6fd4" text-anchor="middle">Sprints 0 → 3  (all new work)</text>

  <!-- ── Node callout labels ── -->
  <g font-family="ui-monospace,monospace" font-size="8.5" text-anchor="middle">
    <!-- main start -->
    <text x="90" y="118" fill="#8a6a40">v1.12.0</text>
    <text x="90" y="128" fill="#5a4828">current</text>
    <!-- fork -->
    <text x="245" y="118" fill="#8b6fd4">v2 branch</text>
    <text x="245" y="128" fill="#5a4898">created</text>
    <!-- merge -->
    <text x="520" y="118" fill="#3a8a4a">merged</text>
    <text x="520" y="128" fill="#2a6a3a">+ deployed</text>
    <!-- live -->
    <text x="670" y="118" fill="#4ade80">LIVE</text>
    <text x="670" y="128" fill="#3a9a5a">v2.3.0</text>
  </g>

  <!-- Branch name labels on left -->
  <text x="40" y="104" font-family="ui-monospace,monospace" font-size="9" font-weight="600" fill="#d4a574" text-anchor="end">main</text>
  <text x="40" y="152" font-family="ui-monospace,monospace" font-size="9" font-weight="600" fill="#a78bfa" text-anchor="end">v2</text>

  <!-- Sprint markers on v2 line -->
  <g font-family="ui-monospace,monospace" font-size="7.5" fill="#6b5fa0" text-anchor="middle">
    <text x="300" y="141">S0</text>
    <text x="340" y="141">S1</text>
    <text x="380" y="141">S2</text>
    <text x="420" y="141">S3</text>
    <text x="462" y="141">S4+</text>
  </g>

  <!-- Legend -->
  <line x1="55" y1="180" x2="80" y2="180" stroke="#d4a574" stroke-width="2.5"/>
  <text x="85" y="183" font-family="ui-monospace,monospace" font-size="8" fill="#8a6a40">main (active)</text>

  <line x1="185" y1="180" x2="210" y2="180" stroke="#6b5030" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="215" y="183" font-family="ui-monospace,monospace" font-size="8" fill="#5a4828">main (frozen)</text>

  <line x1="330" y1="180" x2="355" y2="180" stroke="#a78bfa" stroke-width="2"/>
  <text x="360" y="183" font-family="ui-monospace,monospace" font-size="8" fill="#8b6fd4">v2 branch</text>

  <circle cx="475" cy="180" r="4" fill="#4ade80"/>
  <text x="482" y="183" font-family="ui-monospace,monospace" font-size="8" fill="#3a9a5a">merge / deploy point</text>
</svg>
