  <text x="84" y="63" font-family="ui-monospace,monospace" font-size="9" font-weight="700" fill="#a89cf7">Default Purple</text>
  <text x="84" y="78" font-family="ui-monospace,monospace" font-size="8" fill="#534e7e">accent #d4a574</text>
