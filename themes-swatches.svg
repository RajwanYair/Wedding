<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 130" role="img" aria-label="Wedding Manager Theme Swatches">
  <rect width="860" height="130" rx="14" fill="#0d0b18"/>
  <text x="430" y="22" font-family="ui-monospace,monospace" font-size="11" font-weight="700" fill="#d4a574" text-anchor="middle" letter-spacing="1">5 THEMES — GLASSMORPHISM UI</text>
